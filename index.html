<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enterprise Pipeline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --disco:#B5D4F4; --predemo:#85B7EB; --demo:#378ADD; --onhold:#BA7517;
    --proposal:#185FA5; --psl:#0C447C; --awaiting:#042C53; --won:#3B6D11; --lost:#A32D2D;
    --won-bg:#EAF3DE; --open-bg:#E6F1FB; --lost-bg:#FCEBEB;
    --excl-bg:#FFF8E6; --excl-border:#F0DFB0; --excl-accent:#BA7517;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: #1a1a1a;
    padding: 32px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .subhead { color: #666; font-size: 13px; margin: 0 0 24px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .controls-row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .field label { display:block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .02em; }
  .field input[type=date] {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fafafa;
  }
  .toggle-group { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-group button {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border: none;
    background: #fafafa;
    color: #666;
    cursor: pointer;
  }
  .toggle-group button.active { background: #185FA5; color: #fff; }

  .excl-banner {
    background: var(--excl-bg);
    border: 1px solid var(--excl-border);
    border-left: 4px solid var(--excl-accent);
    border-radius: 12px;
    padding: 16px 22px;
    margin-bottom: 20px;
  }
  .excl-banner .excl-header { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .excl-banner ul { margin: 0 0 8px 18px; padding: 0; font-size: 13px; }
  .excl-banner li { margin-bottom: 4px; }
  .excl-banner details { font-size: 13px; margin-top: 6px; }
  .excl-banner summary { cursor: pointer; font-weight: 600; color: #6b4d09; }
  .excl-group-title { font-weight: 600; margin-top: 8px; }
  .excl-deal-row { display:flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px dashed rgba(0,0,0,0.08); font-size: 12.5px; }

  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .kpi-label { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: .02em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; }
  .kpi-delta { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .delta-up { color: #2f7d1f; }
  .delta-down { color: #b3261e; }
  .delta-flat { color: #888; }

  .chart-card { padding-bottom: 8px; }
  .chart-title { font-size: 15px; font-weight: 700; margin-bottom: 18px; }
  .chart-area { display: flex; align-items: flex-end; gap: 10px; height: 300px; padding-top: 40px; position: relative; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
  .bar-labels-top { position: absolute; top: 0; left: 0; right: 0; text-align: center; line-height: 1.3; }
  .bar-value-label { font-size: 12px; font-weight: 700; }
  .bar-delta-label { font-size: 11px; font-weight: 600; }
  .bar-el { width: 100%; max-width: 56px; border-radius: 4px 4px 0 0; }
  .bar-stage-label { font-size: 11.5px; font-weight: 600; color: #555; margin-top: 8px; text-align: center; }

  .callout-section { margin-bottom: 20px; }
  .callout-header { display:flex; align-items:center; gap: 8px; font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .callout-dot { width: 10px; height: 10px; border-radius: 50%; }
  .callout-row {
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .row-name { font-weight: 700; flex: 1 1 200px; min-width: 160px; }
  .row-amt { font-weight: 700; font-size: 14px; min-width: 80px; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .row-reasons { font-size: 12px; color: #555; flex-basis: 100%; }
  .row-detail { font-size: 12px; color: #555; flex-basis: 100%; font-style: italic; }
  .row-date { font-size: 12px; color: #666; }
  .empty-note { font-size: 13px; color: #888; font-style: italic; }
</style>
</head>

const STAGE_ORDER = ['disco','predemo','demo','onhold','proposal','psl','awaiting','won','lost'];
const OPEN_STAGES = ['disco','predemo','demo','onhold','proposal','psl','awaiting'];
const STAGE_LABELS = {
  disco:'Discovery', predemo:'Pre-Demo', demo:'Demo', onhold:'On Hold', proposal:'Proposal',
  psl:'PSL', awaiting:'Awaiting Contract', won:'Closed Won', lost:'Closed Lost'
};
const STAGE_COLORS = {
  disco:'#B5D4F4', predemo:'#85B7EB', demo:'#378ADD', onhold:'#BA7517', proposal:'#185FA5',
  psl:'#0C447C', awaiting:'#042C53', won:'#3B6D11', lost:'#A32D2D'
};
const DEALTYPE_COLORS = {
  'New - Inbound': {bg:'#EEEDFE', fg:'#3C3489'},
  'Expansion - Sales & CS': {bg:'#FAEEDA', fg:'#633806'},
  'Expansion - non Cust Success': {bg:'#FAEEDA', fg:'#633806'},
  'Win Back': {bg:'#E1F5EE', fg:'#085041'}
};
const DEFAULT_TYPE_COLOR = {bg:'#EFEFEF', fg:'#555555'};

function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString('en-US');
}
function fmtCount(n) { return n.toLocaleString('en-US'); }

function activeDeals() { return ALL_DEALS.filter(d => d.excl === null || d.excl === undefined); }
function excludedDeals() { return ALL_DEALS.filter(d => d.excl); }

function stageAt(deal, dateStr) {
  const target = new Date(dateStr + 'T23:59:59Z').getTime();
  let result = null, maxTs = -Infinity;
  for (const h of deal.history) {
    const ts = new Date(h.t).getTime();
    if (ts <= target && ts >= maxTs) { maxTs = ts; result = h.s; }
  }
  return result;
}

function closedInRange(deal, stageKey, fromStr, toStr) {
  const fromTs = new Date(fromStr + 'T00:00:00Z').getTime();
  const toTs = new Date(toStr + 'T23:59:59Z').getTime();
  return deal.history.some(h => {
    if (h.s !== stageKey) return false;
    const ts = new Date(h.t).getTime();
    return ts >= fromTs && ts <= toTs;
  });
}

function addDaysStr(dateStr, days) {
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10);
}
function dayDiff(fromStr, toStr) {
  const a = new Date(fromStr + 'T00:00:00Z').getTime();
  const b = new Date(toStr + 'T00:00:00Z').getTime();
  return Math.round((b - a) / 86400000);
}

function niceCeiling(max) {
  if (max <= 0) return 1;
  const mag = Math.pow(10, Math.floor(Math.log10(max)));
  const options = [1,2,2.5,5,10];
  for (const o of options) {
    if (o * mag >= max) return o * mag;
  }
  return 10 * mag;
}

function renderExclusionBanner() {
  const excl = excludedDeals();
  const el = document.getElementById('exclBanner');
  if (excl.length === 0) { el.innerHTML = ''; return; }
  const notFit = excl.filter(d => d.excl === 'not_a_fit');
  const over12 = excl.filter(d => d.excl === 'over_12mo');
  const totalArr = excl.reduce((s,d) => s + d.amt, 0);
  const notFitArr = notFit.reduce((s,d) => s + d.amt, 0);
  const over12Arr = over12.reduce((s,d) => s + d.amt, 0);

  let html = `<div class="excl-banner">
    <div class="excl-header">${excl.length} deal(s) (${fmtMoney(totalArr)} ARR) excluded from this view.</div>
    <ul>`;
  if (notFit.length) {
    html += `<li><strong>${notFit.length} marked 'Unqualified — Not a Fit'</strong> (${fmtMoney(notFitArr)} ARR) — buyer expectations the AE confirmed Visme couldn't meet during disco/demo</li>`;
  }
  if (over12.length) {
    html += `<li><strong>${over12.length} open longer than 12 months before close-lost</strong> (${fmtMoney(over12Arr)} ARR) — too stale to reflect current pipeline motion</li>`;
  }
  html += `</ul><details><summary>Show excluded deals</summary>`;
  if (notFit.length) {
    html += `<div class="excl-group-title">Unqualified — Not a Fit</div>`;
    notFit.forEach(d => html += `<div class="excl-deal-row"><span>${d.name}</span><span>${fmtMoney(d.amt)}</span></div>`);
  }
  if (over12.length) {
    html += `<div class="excl-group-title">Open longer than 12 months before close-lost</div>`;
    over12.forEach(d => html += `<div class="excl-deal-row"><span>${d.name}</span><span>${fmtMoney(d.amt)}</span></div>`);
  }
  html += `</details></div>`;
  el.innerHTML = html;
}

function typeTag(type) {
  const c = DEALTYPE_COLORS[type] || DEFAULT_TYPE_COLOR;
  return `<span class="tag" style="background:${c.bg};color:${c.fg}">${type || 'Unknown'}</span>`;
}
function stageTag(stageKey) {
  const color = STAGE_COLORS[stageKey] || '#ccc';
  const fg = (stageKey === 'disco') ? '#0a2a4a' : '#fff';
  return `<span class="tag" style="background:${color};color:${fg}">${STAGE_LABELS[stageKey] || stageKey}</span>`;
}
function lostReasonTag(reason) {
  return `<span class="tag" style="background:#FCEBEB;color:#A32D2D">${reason || 'Unspecified'}</span>`;
}
function deptTag(dept) {
  return `<span class="tag" style="background:#F0F0F0;color:#444">${dept || 'Unknown'}</span>`;
}

function getMetric() { return document.querySelector('.toggle-group button.active').id === 'metricArr' ? 'arr' : 'count'; }

function render() {
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  if (!from || !to) return;
  const metric = getMetric();
  const active = activeDeals();

  renderKpis(active, from, to);
  renderChart(active, from, to, metric);
  renderWonCallout(active, from, to);
  renderOpenCallout(active, to);
  renderLostCallout(active, from, to);
}

function renderKpis(active, from, to) {
  const totalTo = active.filter(d => stageAt(d, to) !== null).length;
  const totalFrom = active.filter(d => stageAt(d, from) !== null).length;

  const openArrAt = (dateStr) => active.filter(d => OPEN_STAGES.includes(stageAt(d, dateStr))).reduce((s,d)=>s+d.amt,0);
  const openArrTo = openArrAt(to);
  const openArrFrom = openArrAt(from);

  const wonCountRange = (f,t) => active.filter(d => closedInRange(d,'won',f,t)).length;
  const wonArrRange = (f,t) => active.filter(d => closedInRange(d,'won',f,t)).reduce((s,d)=>s+d.amt,0);

  const periodDays = dayDiff(from, to);
  const priorTo = addDaysStr(from, -1);
  const priorFrom = addDaysStr(priorTo, -periodDays);

  const wonCountCur = wonCountRange(from, to);
  const wonCountPrior = wonCountRange(priorFrom, priorTo);
  const wonArrCur = wonArrRange(from, to);
  const wonArrPrior = wonArrRange(priorFrom, priorTo);

  const cards = [
    {label:'Total Deals in Pipeline', value: fmtCount(totalTo), delta: totalTo - totalFrom, deltaFmt: (d)=>fmtCount(Math.abs(d))},
    {label:'Open Pipeline ARR', value: fmtMoney(openArrTo), delta: openArrTo - openArrFrom, deltaFmt: (d)=>fmtMoney(Math.abs(d))},
    {label:'Won Deals in Period', value: fmtCount(wonCountCur), delta: wonCountCur - wonCountPrior, deltaFmt: (d)=>fmtCount(Math.abs(d))},
    {label:'Won ARR in Period', value: fmtMoney(wonArrCur), delta: wonArrCur - wonArrPrior, deltaFmt: (d)=>fmtMoney(Math.abs(d))},
  ];

  const el = document.getElementById('kpiRow');
  el.innerHTML = cards.map(c => {
    let cls = 'delta-flat', arrow = '—';
    if (c.delta > 0) { cls = 'delta-up'; arrow = '↑'; }
    else if (c.delta < 0) { cls = 'delta-down'; arrow = '↓'; }
    const deltaText = c.delta === 0 ? '— no change vs prior period' : `${arrow} ${c.deltaFmt(c.delta)} vs prior period`;
    return `<div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-delta ${cls}">${deltaText}</div>
    </div>`;
  }).join('');
}

function renderChart(active, from, to, metric) {
  const valueAt = (dateStr) => {
    const buckets = {};
    STAGE_ORDER.forEach(s => buckets[s] = 0);
    active.forEach(d => {
      const s = stageAt(d, dateStr);
      if (s && buckets.hasOwnProperty(s)) {
        buckets[s] += (metric === 'arr' ? d.amt : 1);
      }
    });
    return buckets;
  };
  const toVals = valueAt(to);
  const fromVals = valueAt(from);
  const maxVal = Math.max(...STAGE_ORDER.map(s => toVals[s]));
  const ceiling = niceCeiling(maxVal || 1);
  const maxBarPx = 220;

  const el = document.getElementById('chartArea');
  el.innerHTML = STAGE_ORDER.map(s => {
    const val = toVals[s];
    const prev = fromVals[s];
    const heightPx = Math.max(2, Math.round((val / ceiling) * maxBarPx));
    const delta = val - prev;
    let cls = 'delta-flat', arrow = '—';
    if (delta > 0) { cls = 'delta-up'; arrow = '↑'; }
    else if (delta < 0) { cls = 'delta-down'; arrow = '↓'; }
    const valLabel = metric === 'arr' ? fmtMoney(val) : fmtCount(val);
    const deltaLabel = delta === 0 ? '—' : `${arrow}${metric==='arr' ? fmtMoney(Math.abs(delta)) : fmtCount(Math.abs(delta))}`;
    return `<div class="bar-col">
      <div class="bar-labels-top">
        <div class="bar-value-label">${valLabel}</div>
        <div class="bar-delta-label ${cls}">${deltaLabel}</div>
      </div>
      <div class="bar-el" style="height:${heightPx}px;background:${STAGE_COLORS[s]}"></div>
      <div class="bar-stage-label">${STAGE_LABELS[s]}</div>
    </div>`;
  }).join('');
}

function topReasons(deal, n) {
  return (deal.why || []).slice(0, n);
}

function renderWonCallout(active, from, to) {
  const deals = active.filter(d => closedInRange(d, 'won', from, to))
                       .sort((a,b) => b.amt - a.amt);
  const el = document.getElementById('wonCallout');
  if (deals.length === 0) { el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.style.background = 'var(--won-bg)';
  const closeDateOf = (d) => (d.history.find(h => h.s === 'won') || {}).d || '';
  el.innerHTML = `<div class="callout-header"><span class="callout-dot" style="background:${STAGE_COLORS.won}"></span>Closed Won (${deals.length})</div>` +
    deals.map(d => `<div class="callout-row" style="background:#fff">
      <span class="row-name">${d.name}</span>
      <span class="row-amt">${fmtMoney(d.amt)}</span>
      ${typeTag(d.type)}
      ${deptTag(d.dept)}
      <span class="row-date">${closeDateOf(d)}</span>
      <div class="row-reasons">${topReasons(d,3).join(' · ')}</div>
    </div>`).join('');
}

function renderOpenCallout(active, to) {
  const deals = active.filter(d => OPEN_STAGES.includes(stageAt(d, to)))
                       .sort((a,b) => b.amt - a.amt)
                       .slice(0,5);
  const el = document.getElementById('openCallout');
  if (deals.length === 0) { el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.style.background = 'var(--open-bg)';
  el.innerHTML = `<div class="callout-header"><span class="callout-dot" style="background:${STAGE_COLORS.disco}"></span>Top 5 Open Deals</div>` +
    deals.map(d => {
      const stage = stageAt(d, to);
      return `<div class="callout-row" style="background:#fff">
      <span class="row-name">${d.name}</span>
      <span class="row-amt">${fmtMoney(d.amt)}</span>
      ${stageTag(stage)}
      ${typeTag(d.type)}
      ${deptTag(d.dept)}
      <div class="row-reasons">${topReasons(d,4).join(' · ')}</div>
    </div>`;
    }).join('');
}

function renderLostCallout(active, from, to) {
  const deals = active.filter(d => closedInRange(d, 'lost', from, to) && d.amt > 12000)
                       .sort((a,b) => b.amt - a.amt);
  const el = document.getElementById('lostCallout');
  if (deals.length === 0) { el.innerHTML = ''; el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.style.background = 'var(--lost-bg)';
  el.innerHTML = `<div class="callout-header"><span class="callout-dot" style="background:${STAGE_COLORS.lost}"></span>High-Value Closed Lost (&gt;$12,000)</div>` +
    deals.map(d => `<div class="callout-row" style="background:#fff">
      <span class="row-name">${d.name}</span>
      <span class="row-amt">${fmtMoney(d.amt)}</span>
      ${lostReasonTag(d.lostReason)}
      ${typeTag(d.type)}
      ${deptTag(d.dept)}
      <div class="row-detail">${d.lostDetail || ''}</div>
    </div>`).join('');
}

function initControls() {
  const todayStr = new Date().toISOString().slice(0,10);
  document.getElementById('fromDate').value = '2025-10-01';
  document.getElementById('toDate').value = todayStr;
  document.getElementById('fromDate').addEventListener('change', render);
  document.getElementById('toDate').addEventListener('change', render);
  document.getElementById('metricCount').addEventListener('click', () => {
    document.getElementById('metricCount').classList.add('active');
    document.getElementById('metricArr').classList.remove('active');
    render();
  });
  document.getElementById('metricArr').addEventListener('click', () => {
    document.getElementById('metricArr').classList.add('active');
    document.getElementById('metricCount').classList.remove('active');
    render();
  });
}

renderExclusionBanner();
initControls();
render();
</script>
</body>
</html>
