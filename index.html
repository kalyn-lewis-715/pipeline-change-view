* { box-sizing: border-box; }

.wrap { max-width: 1280px; margin: 0 auto; }
h1 { font-size: 24px; font-weight: 700; margin: 0 0 4px 0; }
.subtitle { color: #6b6b6b; font-size: 13px; margin-bottom: 20px; }
.card {
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.controls { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 12px; font-weight: 500; color: #6b6b6b; }
.control-group input[type="date"] {
  font-family: inherit;
  font-size: 14px;
  padding: 6px 10px;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 6px;
  background: #fff;
}
.toggle-group { display: inline-flex; border: 1px solid rgba(0,0,0,0.15); border-radius: 6px; overflow: hidden; }
.toggle-btn {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 7px 14px;
  border: none;
  background: #fff;
  cursor: pointer;
  color: #6b6b6b;
}
.toggle-btn.active { background: #1a1a1a; color: #fff; }
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}
.kpi-card {
  background: #fff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  padding: 18px 20px;
}
.kpi-label { font-size: 12px; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
.kpi-value { font-size: 28px; font-weight: 700; margin: 6px 0 4px 0; }
.kpi-delta { font-size: 12px; font-weight: 500; }
.delta-up { color: #2f6f12; }
.delta-down { color: #a32d2d; }
.delta-flat { color: #6b6b6b; }
.section-title { font-size: 16px; font-weight: 600; margin: 0 0 12px 0; }

/* Bar chart — fixed-position labels at top so tall bars never collide */
.chart-wrap { display: flex; gap: 12px; }
.y-axis {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 11px;
  color: #6b6b6b;
  padding: 50px 0 22px 0;
  height: 360px;
  min-width: 60px;
}
.bars-area { flex: 1; position: relative; }
.bars {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
  height: 360px;
  border-bottom: 1px solid rgba(0,0,0,0.12);
  position: relative;
}
.bar-col {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  height: 100%;
}
.bar-delta {
  position: absolute;
  top: 0;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  z-index: 2;
}
.bar-value {
  position: absolute;
  top: 22px;
  font-size: 12px;
  font-weight: 600;
  color: #1a1a1a;
  white-space: nowrap;
  z-index: 2;
}
.bar {
  width: 70%;
  border-radius: 6px 6px 0 0;
  min-height: 0;
}
.bar-label {
  font-size: 11px;
  color: #1a1a1a;
  text-align: center;
  margin-top: 8px;
  height: 22px;
  line-height: 1.1;
}

/* Tags */
.tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 6px;
}
.tag-stage { color: #fff; }
.tag-dept { background: #f0eee9; color: #4a4a4a; }
.tag-lost { background: #fcebeb; color: #842121; }
.tag-type-new { background: #EEEDFE; color: #3C3489; }
.tag-type-exp { background: #FAEEDA; color: #633806; }
.tag-type-winback { background: #E1F5EE; color: #085041; }

/* Callouts */
.callout {
  border-radius: 12px;
  border-left: 4px solid;
  padding: 18px 20px;
  margin-bottom: 16px;
}
.callout-won { background: #EAF3DE; border-left-color: #3B6D11; }
.callout-open { background: #E6F1FB; border-left-color: #185FA5; }
.callout-lost { background: #FCEBEB; border-left-color: #A32D2D; }
.callout-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}
.callout-header .summary { font-weight: 500; color: #4a4a4a; font-size: 13px; }
.deal-row {
  background: #fff;
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
}
.deal-row:last-child { margin-bottom: 0; }
.deal-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.deal-name { font-weight: 600; font-size: 14px; }
.deal-amt { font-weight: 600; font-size: 14px; }
.deal-tags { margin-bottom: 6px; }
.deal-meta { font-size: 12px; color: #4a4a4a; }
.deal-detail { font-size: 12px; color: #4a4a4a; margin-top: 6px; line-height: 1.5; }
.deal-close-date { font-size: 11px; color: #6b6b6b; }

/* Footer note */
.exclusion-note {
  font-size: 11px;
  color: #6b6b6b;
  font-style: italic;
  text-align: center;
  margin-top: 4px;
  padding: 12px 16px 4px 16px;
  line-height: 1.5;
}

@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

// Filter out "Unqualified — Not a Fit" closed-lost deals from the active view.
// These are deals where the AE confirmed through discovery/demo that Visme
// couldn't meet the buyer's needs — including them would unfairly skew our close rate.
const EXCLUDED = ALL_DEALS.filter(d => d.lostReason === 'Unqualified');
const DEALS = ALL_DEALS.filter(d => d.lostReason !== 'Unqualified');

const STAGE_COLORS = {
  disco:    '#B5D4F4',
  predemo:  '#85B7EB',
  demo:     '#378ADD',
  onhold:   '#BA7517',
  proposal: '#185FA5',
  psl:      '#0C447C',
  awaiting: '#042C53',
  won:      '#3B6D11',
  lost:     '#A32D2D'
};
const STAGE_LABELS = {
  disco: 'Discovery',
  predemo: 'Pre-demo',
  demo: 'Demo / eval',
  onhold: 'On hold',
  proposal: 'Proposal sent',
  psl: 'PSL review',
  awaiting: 'Awaiting sigs',
  won: 'Closed won',
  lost: 'Closed lost'
};
const STAGE_ORDER = ['disco','predemo','demo','onhold','proposal','psl','awaiting','won','lost'];
const OPEN_STAGES = ['disco','predemo','demo','onhold','proposal','psl','awaiting'];

const TYPE_TAG_CLASS = {
  'New - Inbound': 'tag-type-new',
  'Expansion - Sales & CS': 'tag-type-exp',
  'Expansion - non Cust Success': 'tag-type-exp',
  'Win Back': 'tag-type-winback'
};

function fmtMoney(n) {
  if (n >= 1000) return '$' + Math.round(n).toLocaleString();
  return '$' + n;
}
function fmtMoneyShort(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n;
}
function parseDateOnly(s) { return new Date(s + 'T00:00:00Z').getTime(); }
function parseDateEnd(s)  { return new Date(s + 'T23:59:59Z').getTime(); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00Z');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
}

function stageAt(deal, dateStr) {
  const target = parseDateEnd(dateStr);
  let bestT = -1;
  let bestStage = null;
  for (const h of deal.history) {
    const t = h.t ? new Date(h.t).getTime() : parseDateEnd(h.d);
    if (t <= target && t >= bestT) {
      bestT = t;
      bestStage = h.s;
    }
  }
  return bestStage;
}

function isClosedInRange(deal, stageKey, fromStr, toStr) {
  const fromT = parseDateOnly(fromStr);
  const toT = parseDateEnd(toStr);
  for (const h of deal.history) {
    if (h.s === stageKey) {
      const t = h.t ? new Date(h.t).getTime() : parseDateEnd(h.d);
      if (t >= fromT && t <= toT) return { inRange: true, t: t };
    }
  }
  return { inRange: false, t: null };
}

function dealsAtDate(dateStr) {
  return DEALS.map(d => ({ deal: d, stage: stageAt(d, dateStr) }))
              .filter(x => x.stage !== null);
}

function niceCeiling(maxVal) {
  if (maxVal <= 0) return 1;
  const exp = Math.floor(Math.log10(maxVal));
  const base = Math.pow(10, exp);
  const norm = maxVal / base;
  let nice;
  if (norm <= 1) nice = 1;
  else if (norm <= 2) nice = 2;
  else if (norm <= 2.5) nice = 2.5;
  else if (norm <= 5) nice = 5;
  else nice = 10;
  return nice * base;
}

function valuesByStage(dateStr, metric) {
  const stageMap = {};
  STAGE_ORDER.forEach(s => stageMap[s] = 0);
  const dealsAt = dealsAtDate(dateStr);
  for (const { deal, stage } of dealsAt) {
    if (metric === 'count') stageMap[stage] += 1;
    else stageMap[stage] += deal.amt;
  }
  return stageMap;
}

function renderKPIs(fromStr, toStr, metric) {
  const grid = document.getElementById('kpiGrid');
  grid.innerHTML = '';

  const dealsAtTo = dealsAtDate(toStr);
  const dealsAtFrom = dealsAtDate(fromStr);

  const totalAtTo = dealsAtTo.length;
  const totalAtFrom = dealsAtFrom.length;
  const totalDelta = totalAtTo - totalAtFrom;

  const openArrAtTo = dealsAtTo.filter(x => OPEN_STAGES.includes(x.stage)).reduce((s, x) => s + x.deal.amt, 0);
  const openArrAtFrom = dealsAtFrom.filter(x => OPEN_STAGES.includes(x.stage)).reduce((s, x) => s + x.deal.amt, 0);
  const openArrDelta = openArrAtTo - openArrAtFrom;

  const wonDealsInPeriod = DEALS.filter(d => isClosedInRange(d, 'won', fromStr, toStr).inRange);
  const wonCount = wonDealsInPeriod.length;
  const wonArr = wonDealsInPeriod.reduce((s, d) => s + d.amt, 0);

  const fromT = parseDateOnly(fromStr);
  const toT = parseDateEnd(toStr);
  const periodMs = toT - fromT;
  const priorTo = new Date(fromT - 1).toISOString().slice(0,10);
  const priorFrom = new Date(fromT - 1 - periodMs).toISOString().slice(0,10);
  const priorWonDeals = DEALS.filter(d => isClosedInRange(d, 'won', priorFrom, priorTo).inRange);
  const priorWonCount = priorWonDeals.length;
  const priorWonArr = priorWonDeals.reduce((s, d) => s + d.amt, 0);

  function deltaHtml(d, isMoney) {
    if (d > 0) return '<span class="delta-up">▲ ' + (isMoney ? fmtMoneyShort(d) : '+' + d) + '</span>';
    if (d < 0) return '<span class="delta-down">▼ ' + (isMoney ? fmtMoneyShort(Math.abs(d)) : d) + '</span>';
    return '<span class="delta-flat">— no change</span>';
  }

  function card(label, value, delta, sub) {
    return '<div class="kpi-card">' +
           '<div class="kpi-label">' + label + '</div>' +
           '<div class="kpi-value">' + value + '</div>' +
           '<div class="kpi-delta">' + delta + (sub ? ' <span style="color:#9a9a9a">' + sub + '</span>' : '') + '</div>' +
           '</div>';
  }

  grid.innerHTML =
    card('Deals in pipeline', totalAtTo, deltaHtml(totalDelta, false), 'vs From') +
    card('Open pipeline ARR', fmtMoneyShort(openArrAtTo), deltaHtml(openArrDelta, true), 'vs From') +
    card('Won deals in period', wonCount, deltaHtml(wonCount - priorWonCount, false), 'vs prior period') +
    card('Won ARR in period', fmtMoneyShort(wonArr), deltaHtml(wonArr - priorWonArr, true), 'vs prior period');
}

function renderChart(fromStr, toStr, metric) {
  const valsTo = valuesByStage(toStr, metric);
  const valsFrom = valuesByStage(fromStr, metric);

  const maxVal = Math.max(...STAGE_ORDER.map(s => valsTo[s]), 1);
  const ceiling = niceCeiling(maxVal);

  const yAxis = document.getElementById('yAxis');
  const ticks = [];
  for (let i = 4; i >= 0; i--) {
    const v = ceiling * (i / 4);
    ticks.push(metric === 'arr' ? fmtMoneyShort(v) : Math.round(v).toString());
  }
  yAxis.innerHTML = ticks.map(t => '<span>' + t + '</span>').join('');

  const bars = document.getElementById('bars');
  const chartHeight = 360;
  const headroom = 60; // 0–22 delta, 22–44 value, 44 padding before bar tops
  const usableHeight = chartHeight - headroom;

  bars.innerHTML = STAGE_ORDER.map(s => {
    const v = valsTo[s];
    const vFrom = valsFrom[s];
    const delta = v - vFrom;
    const heightPx = ceiling > 0 ? Math.round((v / ceiling) * usableHeight) : 0;
    const valLabel = metric === 'arr' ? fmtMoneyShort(v) : v.toString();

    let deltaHtml;
    if (delta > 0) deltaHtml = '<span class="delta-up">↑ ' + (metric === 'arr' ? fmtMoneyShort(delta) : '+' + delta) + '</span>';
    else if (delta < 0) deltaHtml = '<span class="delta-down">↓ ' + (metric === 'arr' ? fmtMoneyShort(Math.abs(delta)) : delta) + '</span>';
    else deltaHtml = '<span class="delta-flat">—</span>';

    return '<div class="bar-col">' +
           '<span class="bar-delta">' + deltaHtml + '</span>' +
           '<span class="bar-value">' + valLabel + '</span>' +
           '<div class="bar" style="height:' + heightPx + 'px; background:' + STAGE_COLORS[s] + ';"></div>' +
           '<div class="bar-label">' + STAGE_LABELS[s] + '</div>' +
           '</div>';
  }).join('');
}

function typeTagHtml(t) {
  const cls = TYPE_TAG_CLASS[t] || 'tag-dept';
  return '<span class="tag ' + cls + '">' + (t || 'Unspecified') + '</span>';
}
function deptTagHtml(d) {
  if (!d) return '';
  return '<span class="tag tag-dept">' + d + '</span>';
}
function stageTagHtml(s) {
  return '<span class="tag tag-stage" style="background:' + STAGE_COLORS[s] + '">' + STAGE_LABELS[s] + '</span>';
}
function topReasons(why, n) {
  if (!why) return '';
  return why.split(';').map(r => r.replace(/^\*/, '').trim()).filter(Boolean).slice(0, n).join(' · ');
}

function renderCalloutWon(fromStr, toStr) {
  const wonDeals = DEALS.map(d => {
    const r = isClosedInRange(d, 'won', fromStr, toStr);
    return r.inRange ? { deal: d, t: r.t } : null;
  }).filter(Boolean).sort((a, b) => b.deal.amt - a.deal.amt);

  const c = document.getElementById('calloutWon');
  if (wonDeals.length === 0) { c.innerHTML = ''; return; }

  const totalArr = wonDeals.reduce((s, x) => s + x.deal.amt, 0);
  const rows = wonDeals.map(({ deal }) => {
    return '<div class="deal-row">' +
           '<div class="deal-top"><span class="deal-name">' + deal.name + '</span><span class="deal-amt">' + fmtMoney(deal.amt) + '</span></div>' +
           '<div class="deal-tags">' + typeTagHtml(deal.type) + deptTagHtml(deal.dept) + '</div>' +
           '<div class="deal-meta">' + topReasons(deal.why, 3) + '</div>' +
           '<div class="deal-close-date">Closed ' + fmtDate(deal.closed) + '</div>' +
           '</div>';
  }).join('');

  c.innerHTML = '<div class="callout callout-won">' +
                '<div class="callout-header"><span>Closed Won (' + wonDeals.length + ')</span><span class="summary">' + fmtMoneyShort(totalArr) + ' total ARR</span></div>' +
                rows + '</div>';
}

function renderCalloutOpen(toStr) {
  const open = DEALS.map(d => ({ deal: d, stage: stageAt(d, toStr) }))
                    .filter(x => x.stage && OPEN_STAGES.includes(x.stage))
                    .sort((a, b) => b.deal.amt - a.deal.amt)
                    .slice(0, 5);

  const c = document.getElementById('calloutOpen');
  if (open.length === 0) { c.innerHTML = ''; return; }

  const totalArr = open.reduce((s, x) => s + x.deal.amt, 0);
  const rows = open.map(({ deal, stage }) => {
    return '<div class="deal-row">' +
           '<div class="deal-top"><span class="deal-name">' + deal.name + '</span><span class="deal-amt">' + fmtMoney(deal.amt) + '</span></div>' +
           '<div class="deal-tags">' + stageTagHtml(stage) + typeTagHtml(deal.type) + deptTagHtml(deal.dept) + '</div>' +
           '<div class="deal-meta">' + topReasons(deal.why, 4) + '</div>' +
           '</div>';
  }).join('');

  c.innerHTML = '<div class="callout callout-open">' +
                '<div class="callout-header"><span>Top 5 Open Deals</span><span class="summary">' + fmtMoneyShort(totalArr) + ' combined ARR</span></div>' +
                rows + '</div>';
}

function renderCalloutLost(fromStr, toStr) {
  const lostDeals = DEALS.map(d => {
    const r = isClosedInRange(d, 'lost', fromStr, toStr);
    return r.inRange ? { deal: d, t: r.t } : null;
  }).filter(Boolean).filter(x => x.deal.amt > 12000).sort((a, b) => b.deal.amt - a.deal.amt);

  const c = document.getElementById('calloutLost');
  if (lostDeals.length === 0) { c.innerHTML = ''; return; }

  const totalArr = lostDeals.reduce((s, x) => s + x.deal.amt, 0);
  const rows = lostDeals.map(({ deal }) => {
    const lostTag = deal.lostReason ? '<span class="tag tag-lost">' + deal.lostReason + '</span>' : '';
    return '<div class="deal-row">' +
           '<div class="deal-top"><span class="deal-name">' + deal.name + '</span><span class="deal-amt">' + fmtMoney(deal.amt) + '</span></div>' +
           '<div class="deal-tags">' + lostTag + typeTagHtml(deal.type) + deptTagHtml(deal.dept) + '</div>' +
           (deal.lostDetail ? '<div class="deal-detail">' + deal.lostDetail + '</div>' : '') +
           '</div>';
  }).join('');

  c.innerHTML = '<div class="callout callout-lost">' +
                '<div class="callout-header"><span>High-Value Closed Lost (' + lostDeals.length + ')</span><span class="summary">' + fmtMoneyShort(totalArr) + ' combined ARR</span></div>' +
                rows + '</div>';
}

function renderExclusionNote() {
  const note = document.getElementById('exclusionNote');
  note.innerHTML = "Excluded from this view: deals marked &lsquo;Unqualified &mdash; Not a Fit,&rsquo; where the AE confirmed through discovery/demo that Visme couldn&rsquo;t meet the buyer&rsquo;s needs. Including them would unfairly skew our close rate.";
}

let currentMetric = 'count';

function rerender() {
  const fromStr = document.getElementById('fromDate').value;
  const toStr = document.getElementById('toDate').value;
  if (!fromStr || !toStr) return;
  renderKPIs(fromStr, toStr, currentMetric);
  renderChart(fromStr, toStr, currentMetric);
  renderCalloutWon(fromStr, toStr);
  renderCalloutOpen(toStr);
  renderCalloutLost(fromStr, toStr);
}

  document.getElementById('toDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('fromDate').addEventListener('change', rerender);

  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMetric = btn.dataset.metric;
      rerender();
    });
  });
  rerender();
  renderExclusionNote();
});
</script>
</body>
</html>
