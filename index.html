<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f5f4f0;color:#1a1a1a;padding:24px 20px;font-size:14px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.subtitle{color:#666;font-size:13px;margin-bottom:20px}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:20px;margin-bottom:16px}
.controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.controls label{font-weight:500;font-size:13px;color:#555}
.controls input[type=date]{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-family:inherit;font-size:13px;color:#1a1a1a}
.toggle-group{display:flex;border:1px solid #ddd;border-radius:6px;overflow:hidden}
.toggle-group button{border:none;background:#fff;padding:6px 14px;font-family:inherit;font-size:13px;cursor:pointer;font-weight:500;color:#555}
.toggle-group button.active{background:#1a1a1a;color:#fff}
/* Exclusion banner */
.excl-banner{background:#FFF8E6;border:1px solid #F0DFB0;border-left:4px solid #BA7517;border-radius:8px;padding:14px 16px;margin-bottom:16px}
.excl-banner h3{font-size:13px;font-weight:600;color:#7A4A00;margin-bottom:8px}
.excl-banner ul{margin:0 0 10px 16px;color:#7A4A00;font-size:12px;line-height:1.7}
.excl-banner details summary{font-size:12px;font-weight:600;color:#BA7517;cursor:pointer;margin-top:4px}
.excl-banner details ul{margin:8px 0 0 12px;color:#555;font-size:12px}
/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:16px}
.kpi-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:26px;font-weight:700;color:#1a1a1a;line-height:1}
.kpi-delta{font-size:12px;margin-top:5px;font-weight:500}
.kpi-delta.up{color:#3B6D11}.kpi-delta.down{color:#A32D2D}.kpi-delta.flat{color:#888}
/* Chart */
.chart-title{font-size:14px;font-weight:600;margin-bottom:16px}
.chart-wrap{overflow-x:auto}
.chart{display:flex;align-items:flex-end;gap:10px;min-height:220px;padding:30px 0 0;position:relative}
.bar-col{display:flex;flex-direction:column;align-items:center;min-width:72px;position:relative}
.bar-delta{font-size:11px;font-weight:600;position:absolute;top:0;white-space:nowrap}
.bar-delta.up{color:#3B6D11}.bar-delta.down{color:#A32D2D}.bar-delta.flat{color:#888}
.bar-value{font-size:11px;font-weight:700;margin-bottom:3px;color:#1a1a1a}
.bar{width:52px;border-radius:6px 6px 0 0;min-height:4px;transition:height .3s}
.bar-label{font-size:11px;font-weight:500;margin-top:5px;color:#555;text-align:center}
/* Callouts */
.callout{border-radius:12px;padding:16px;margin-bottom:16px}
.callout.won{background:#EAF3DE;border:1px solid #c3dba6}
.callout.open{background:#E6F1FB;border:1px solid #aacfee}
.callout.lost{background:#FCEBEB;border:1px solid #f0bcbc}
.callout-title{font-size:14px;font-weight:700;margin-bottom:12px}
.deal-row{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid rgba(0,0,0,0.06)}
.deal-name{font-weight:600;font-size:13px;margin-bottom:4px}
.deal-meta{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 6px;align-items:center}
.deal-amt{font-weight:700;font-size:15px;color:#1a1a1a}
.tag{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600}
.tag-stage-disco{background:#B5D4F4;color:#0a3a6b}
.tag-stage-predemo{background:#85B7EB;color:#0a3a6b}
.tag-stage-demo{background:#378ADD;color:#fff}
.tag-stage-onhold{background:#BA7517;color:#fff}
.tag-stage-proposal{background:#185FA5;color:#fff}
.tag-stage-psl{background:#0C447C;color:#fff}
.tag-stage-awaiting{background:#042C53;color:#fff}
.tag-stage-won{background:#3B6D11;color:#fff}
.tag-stage-lost{background:#A32D2D;color:#fff}
.tag-type-new{background:#EEEDFE;color:#3C3489}
.tag-type-exp{background:#FAEEDA;color:#633806}
.tag-type-winback{background:#E1F5EE;color:#085041}
.deal-why{font-size:12px;color:#555;line-height:1.5}
.deal-lost-detail{font-size:12px;color:#7A0000;margin-top:4px;line-height:1.5}
.deal-dept{font-size:12px;color:#666}
.deal-date{font-size:11px;color:#999}
.empty-msg{font-size:13px;color:#888;padding:8px 0}
@media(max-width:700px){.kpi-row{grid-template-columns:repeat(2,1fr)}.bar-col{min-width:50px}.bar{width:36px}}
</style>
</head>

const OPEN_STAGES = new Set(['disco','predemo','demo','onhold','proposal','psl','awaiting']);
const STAGE_ORDER = ['disco','predemo','demo','onhold','proposal','psl','awaiting','won','lost'];
const STAGE_COLORS = {disco:'#B5D4F4',predemo:'#85B7EB',demo:'#378ADD',onhold:'#BA7517',proposal:'#185FA5',psl:'#0C447C',awaiting:'#042C53',won:'#3B6D11',lost:'#A32D2D'};
const STAGE_LABELS = {disco:'Disco',predemo:'Pre-Demo',demo:'Demo',onhold:'On Hold',proposal:'Proposal',psl:'PSL',awaiting:'Awaiting',won:'Won',lost:'Lost'};

let metric = 'count';

function setMetric(m) {
  metric = m;
  document.getElementById('btnCount').className = m==='count'?'active':'';
  document.getElementById('btnArr').className = m==='arr'?'active':'';
  render();
}

function fmt(n, m) {
  if (m==='arr') return '$'+n.toLocaleString();
  return n.toString();
}

function fmtDelta(n, m) {
  if (n===0) return {txt:'—', cls:'flat'};
  const s = m==='arr' ? (n>0?'+$':'−$')+Math.abs(n).toLocaleString() : (n>0?'+':'')+n;
  return {txt: s, cls: n>0?'up':'down'};
}

// stageAt: what stage was deal in at the given date string (YYYY-MM-DD)?
// target = 23:59:59 UTC on that date
function stageAt(deal, dateStr) {
  const target = new Date(dateStr + 'T23:59:59Z').getTime();
  let best = null, bestT = -1;
  for (const h of deal.history) {
    const t = new Date(h.t).getTime();
    if (t <= target && t >= bestT) {
      best = h.s;
      bestT = t;
    }
  }
  return best;
}

function closedInRange(deal, stageKey, fromStr, toStr) {
  const lo = new Date(fromStr + 'T00:00:00Z').getTime();
  const hi = new Date(toStr + 'T23:59:59Z').getTime();
  for (const h of deal.history) {
    if (h.s === stageKey) {
      const t = new Date(h.t).getTime();
      if (t >= lo && t <= hi) return true;
    }
  }
  return false;
}

function render() {
  const fromStr = document.getElementById('fromDate').value;
  const toStr = document.getElementById('toDate').value;
  if (!fromStr || !toStr) return;

  const active = ALL_DEALS.filter(d => !d.excl);

  // --- Exclusion banner (static) ---
  renderExclBanner();

  // --- Stage counts/ARR at To and From ---
  function stagesBuckets(dateStr) {
    const buckets = {};
    for (const s of STAGE_ORDER) buckets[s] = {count:0,arr:0};
    for (const d of active) {
      const s = stageAt(d, dateStr);
      if (s && buckets[s]) {
        buckets[s].count++;
        buckets[s].arr += d.amt;
      }
    }
    return buckets;
  }
  const bucketsTo = stagesBuckets(toStr);
  const bucketsFrom = stagesBuckets(fromStr);

  // --- KPI: total deals in pipeline @ To ---
  let totalTo=0, totalFrom=0, openArrTo=0, openArrFrom=0;
  for (const s of STAGE_ORDER) {
    totalTo += bucketsTo[s].count;
    totalFrom += bucketsFrom[s].count;
    if (OPEN_STAGES.has(s)) {
      openArrTo += bucketsTo[s].arr;
      openArrFrom += bucketsFrom[s].arr;
    }
  }

  // --- KPI: Won in period + prior period ---
  const fromDate = new Date(fromStr);
  const toDate = new Date(toStr);
  const periodMs = toDate - fromDate;
  const priorToDate = new Date(fromDate - 1);
  const priorFromDate = new Date(priorToDate - periodMs);
  const priorFromStr = priorFromDate.toISOString().slice(0,10);
  const priorToStr = priorToDate.toISOString().slice(0,10);

  let wonCount=0, wonArr=0, wonPriorCount=0, wonPriorArr=0;
  for (const d of active) {
    if (closedInRange(d,'won',fromStr,toStr)) { wonCount++; wonArr+=d.amt; }
    if (closedInRange(d,'won',priorFromStr,priorToStr)) { wonPriorCount++; wonPriorArr+=d.amt; }
  }

  // --- Render KPI cards ---
  const kpis = [
    {label:'Total Deals in Pipeline', val:totalTo, delta: totalTo-totalFrom, isArr:false},
    {label:'Open Pipeline ARR', val:openArrTo, delta: openArrTo-openArrFrom, isArr:true},
    {label:'Won Deals (Period)', val:wonCount, delta: wonCount-wonPriorCount, isArr:false},
    {label:'Won ARR (Period)', val:wonArr, delta: wonArr-wonPriorArr, isArr:true},
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k => {
    const d = fmtDelta(k.delta, k.isArr?'arr':'count');
    return `<div class="kpi-card"><div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.isArr?'$'+k.val.toLocaleString():k.val}</div>
      <div class="kpi-delta ${d.cls}">${d.txt} vs ${fromStr}</div></div>`;
  }).join('');

  // --- Bar chart ---
  const m2 = metric;
  const maxVal = Math.max(...STAGE_ORDER.map(s=>bucketsTo[s][m2==='arr'?'arr':'count']),1);
  const ceil = Math.ceil(maxVal/5)*5 || 5;
  const MAX_H = 160;
  document.getElementById('chartTitle').textContent = m2==='arr' ? 'ARR by Stage ($)' : 'Deal Count by Stage';

  const bars = STAGE_ORDER.map(s => {
    const valTo = bucketsTo[s][m2==='arr'?'arr':'count'];
    const valFrom = bucketsFrom[s][m2==='arr'?'arr':'count'];
    const delta = valTo - valFrom;
    const barH = Math.max(valTo===0?0:4, Math.round(valTo/ceil*MAX_H));
    const dd = fmtDelta(delta, m2);
    const valStr = m2==='arr'?'$'+valTo.toLocaleString():valTo;
    return `<div class="bar-col" style="height:${MAX_H+30}px">
      <span class="bar-delta ${dd.cls}" style="position:absolute;top:0;left:50%;transform:translateX(-50%)">${dd.txt}</span>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-top:18px">
        <div class="bar-value">${valStr}</div>
        <div class="bar" style="height:${barH}px;background:${STAGE_COLORS[s]}"></div>
      </div>
      <div class="bar-label">${STAGE_LABELS[s]}</div>
    </div>`;
  }).join('');
  document.getElementById('chart').innerHTML = bars;

  // --- Won callout ---
  const wonDeals = active.filter(d=>closedInRange(d,'won',fromStr,toStr));
  wonDeals.sort((a,b)=>b.amt-a.amt);
  const wonHTML = wonDeals.length===0
    ? '<p class="empty-msg">No closed-won deals in this period.</p>'
    : wonDeals.map(d => dealRow(d,'won')).join('');
  document.getElementById('wonCallout').innerHTML =
    `<div class="callout won"><div class="callout-title">🏆 Closed Won (${wonDeals.length} deal${wonDeals.length!==1?'s':''} · ${' $'+wonDeals.reduce((s,d)=>s+d.amt,0).toLocaleString()})</div>${wonHTML}</div>`;

  // --- Top 5 open callout ---
  const openDeals = active.filter(d=>{const s=stageAt(d,toStr);return s&&OPEN_STAGES.has(s);});
  openDeals.sort((a,b)=>b.amt-a.amt);
  const top5 = openDeals.slice(0,5);
  const openHTML = top5.length===0
    ? '<p class="empty-msg">No open deals at selected To date.</p>'
    : top5.map(d => dealRow(d,'open', stageAt(d,toStr))).join('');
  document.getElementById('openCallout').innerHTML =
    `<div class="callout open"><div class="callout-title">🔵 Top 5 Open Deals · ${' $'+openDeals.slice(0,5).reduce((s,d)=>s+d.amt,0).toLocaleString()} ARR</div>${openHTML}</div>`;

  // --- High-value lost callout ---
  const hvLost = active.filter(d=>d.amt>12000&&closedInRange(d,'lost',fromStr,toStr));
  hvLost.sort((a,b)=>b.amt-a.amt);
  const lostHTML = hvLost.length===0
    ? '<p class="empty-msg">No high-value lost deals (&gt;$12k ARR) in this period.</p>'
    : hvLost.map(d => dealRow(d,'lost')).join('');
  document.getElementById('lostCallout').innerHTML = hvLost.length===0 ? '' :
    `<div class="callout lost"><div class="callout-title">🔴 High-Value Closed Lost &gt;$12k (${hvLost.length} deal${hvLost.length!==1?'s':''})</div>${lostHTML}</div>`;
}

function dealRow(deal, context, currentStage) {
  const typeTag = typeTagHtml(deal.type);
  const stageKey = currentStage || deal.stage;
  const stageTag = stageKey ? `<span class="tag tag-stage-${stageKey}">${STAGE_LABELS[stageKey]||stageKey}</span>` : '';
  const deptTag = deal.dept ? `<span style="font-size:11px;color:#777">🏢 ${deal.dept}</span>` : '';
  const whys = deal.why ? deal.why.split(';').map(w=>w.replace(/^\*/,'').trim()).filter(Boolean).slice(0,context==='open'?4:3) : [];
  const whyHtml = whys.length ? `<div class="deal-why">💡 ${whys.join(' · ')}</div>` : '';
  const dateLabel = context==='won' ? `Closed ${deal.closed}` : context==='lost' ? `Lost ${closedDate(deal,'lost')}` : `Created ${deal.created}`;
  const lostDetailHtml = (context==='lost'&&deal.lostDetail) ? `<div class="deal-lost-detail">📋 ${deal.lostDetail}</div>` : '';
  const lostReasonTag = (context==='lost'&&deal.lostReason) ? `<span class="tag" style="background:#f7d5d5;color:#7a0000">${deal.lostReason}</span>` : '';
  return `<div class="deal-row">
    <div class="deal-name">${deal.name}</div>
    <div class="deal-meta">
      <span class="deal-amt">$${deal.amt.toLocaleString()}</span>
      ${context==='open'?stageTag:''}
      ${typeTag}
      ${context==='lost'?lostReasonTag:''}
      ${deptTag}
      <span class="deal-date">${dateLabel}</span>
    </div>
    ${whyHtml}
    ${lostDetailHtml}
  </div>`;
}

function closedDate(deal, stageKey) {
  for (const h of deal.history) {
    if (h.s===stageKey) return h.d;
  }
  return deal.closed;
}

function typeTagHtml(type) {
  if (!type) return '';
  if (type.startsWith('New')) return `<span class="tag tag-type-new">New Inbound</span>`;
  if (type.startsWith('Expansion')) return `<span class="tag tag-type-exp">${type}</span>`;
  if (type==='Win Back') return `<span class="tag tag-type-winback">Win Back</span>`;
  return `<span class="tag" style="background:#eee;color:#555">${type}</span>`;
}

function renderExclBanner() {
  const excl = ALL_DEALS.filter(d=>d.excl);
  if (excl.length===0) { document.getElementById('exclBanner').innerHTML=''; return; }
  const naf = excl.filter(d=>d.excl==='not_a_fit');
  const o12 = excl.filter(d=>d.excl==='over_12mo');
  const totalArr = excl.reduce((s,d)=>s+d.amt,0);
  const nafArr = naf.reduce((s,d)=>s+d.amt,0);
  const o12Arr = o12.reduce((s,d)=>s+d.amt,0);
  const nafList = naf.map(d=>`<li>${d.name} — $${d.amt.toLocaleString()}</li>`).join('');
  const o12List = o12.map(d=>`<li>${d.name} — $${d.amt.toLocaleString()}</li>`).join('');
  document.getElementById('exclBanner').innerHTML = `<div class="excl-banner">
    <h3>⚠️ ${excl.length} deal${excl.length!==1?'s':''} (${' $'+totalArr.toLocaleString()} ARR) excluded from this view</h3>
    <ul>
      ${naf.length>0?`<li><strong>${naf.length} marked "Unqualified — Not a Fit"</strong> (${' $'+nafArr.toLocaleString()} ARR) — buyer expectations the AE confirmed Visme couldn't meet during disco/demo</li>`:''}
      ${o12.length>0?`<li><strong>${o12.length} open longer than 12 months before close-lost</strong> (${' $'+o12Arr.toLocaleString()} ARR) — too stale to reflect current pipeline motion</li>`:''}
    </ul>
    <details>
      <summary>Show excluded deals</summary>
      ${naf.length>0?`<strong style="font-size:12px;color:#555">Unqualified — Not a Fit</strong><ul>${nafList}</ul>`:''}
      ${o12.length>0?`<strong style="font-size:12px;color:#555;display:block;margin-top:8px">Open 12+ Months Before Lost</strong><ul>${o12List}</ul>`:''}
    </details>
  </div>`;
}

document.getElementById('fromDate').addEventListener('change', render);
document.getElementById('toDate').addEventListener('change', render);
render();
</script>
